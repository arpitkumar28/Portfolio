    <g transform="translate(358 70)">
      <rect width="264" height="500" rx="34" fill="#080808" stroke="#2e2e2e" stroke-width="2"/>
      <text x="72" y="58" fill="#ff9f0a" font-size="30" font-family="Inter, Arial" font-weight="600">Attendance</text>
      <rect x="22" y="92" width="220" height="112" rx="22" fill="#191919"/>
      <text x="68" y="134" fill="#b7b7b7" font-size="17" font-family="Inter, Arial">Attendance Percentage</text>
      <text x="86" y="182" fill="#ff9f0a" font-size="48" font-family="Inter, Arial" font-weight="900">100%</text>
      <rect x="22" y="246" width="220" height="64" rx="28" fill="#ff9f0a"/>
      <text x="64" y="286" fill="#0c0c0c" font-size="21" font-family="Inter, Arial" font-weight="900">MARK ATTENDANCE</text>
