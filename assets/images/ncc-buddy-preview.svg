<svg xmlns="http://www.w3.org/2000/svg" width="980" height="620" viewBox="0 0 980 620" role="img" aria-labelledby="title desc">
  <title id="title">NCC Buddy app preview</title>
  <desc id="desc">Three mobile app screens showing NCC Buddy dashboard, attendance, and emergency SOS views.</desc>
  <defs>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ffb000"/>
      <stop offset="1" stop-color="#f04438"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#181818"/>
      <stop offset="1" stop-color="#2a1306"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="145%">
      <feDropShadow dx="0" dy="26" stdDeviation="24" flood-color="#000" flood-opacity=".35"/>
    </filter>
  </defs>
  <rect width="980" height="620" rx="28" fill="#080808"/>
  <circle cx="168" cy="92" r="116" fill="#ff9f0a" opacity=".16"/>
  <circle cx="820" cy="508" r="160" fill="#ef4444" opacity=".13"/>
  <g filter="url(#shadow)">
    <g transform="translate(58 38)">
      <rect width="264" height="544" rx="34" fill="#080808" stroke="#2e2e2e" stroke-width="2"/>
      <rect x="22" y="38" width="220" height="150" rx="28" fill="url(#card)"/>
      <text x="42" y="78" fill="#ffba45" font-size="16" font-family="Inter, Arial" font-weight="800" letter-spacing="4">NATIONAL CADET CORPS</text>
      <text x="42" y="116" fill="#fff" font-size="30" font-family="Inter, Arial" font-weight="900">Welcome back,</text>
      <text x="42" y="151" fill="#fff" font-size="30" font-family="Inter, Arial" font-weight="900">aa</text>
      <rect x="182" y="68" width="42" height="42" rx="14" fill="#fff"/>
      <path d="M203 80l16 7v12c0 13-7 21-16 26-9-5-16-13-16-26V87l16-7z" fill="#ff9f0a"/>
      <text x="22" y="244" fill="#fff" font-size="22" font-family="Inter, Arial" font-weight="900">Quick Access</text>
      <rect x="22" y="276" width="96" height="108" rx="22" fill="url(#warm)"/>
      <rect x="142" y="276" width="96" height="108" rx="22" fill="url(#warm)" opacity=".92"/>
      <rect x="22" y="406" width="96" height="108" rx="22" fill="#dc2626"/>
      <rect x="142" y="406" width="96" height="108" rx="22" fill="#ef4444"/>
