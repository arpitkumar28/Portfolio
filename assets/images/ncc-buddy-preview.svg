      <text x="70" y="370" fill="#ff9f0a" font-size="18" font-family="Inter, Arial" font-weight="900">SCAN QR ATTENDANCE</text>
      <text x="22" y="438" fill="#fff" font-size="25" font-family="Inter, Arial" font-weight="900">Attendance History</text>
