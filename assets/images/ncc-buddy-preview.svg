      <text x="166" y="350" fill="#fff" font-size="19" font-family="Inter, Arial" font-weight="900">Events</text>
      <text x="42" y="480" fill="#fff" font-size="19" font-family="Inter, Arial" font-weight="900">Notices</text>
      <text x="162" y="474" fill="#fff" font-size="19" font-family="Inter, Arial" font-weight="900">Emergency</text>
      <text x="162" y="498" fill="#fff" font-size="19" font-family="Inter, Arial" font-weight="900">SOS</text>
