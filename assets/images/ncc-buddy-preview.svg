      <circle cx="132" cy="262" r="8" fill="#ef4444"/>
      <text x="42" y="346" fill="#fff" font-size="31" font-family="Inter, Arial" font-weight="900">Emergency</text>
      <text x="42" y="384" fill="#fff" font-size="31" font-family="Inter, Arial" font-weight="900">Assistance</text>
      <text x="38" y="428" fill="#a8a8a8" font-size="18" font-family="Inter, Arial">Send live location and alert</text>
      <text x="66" y="454" fill="#a8a8a8" font-size="18" font-family="Inter, Arial">to NCC Buddy safety system.</text>
      <rect x="46" y="490" width="172" height="58" rx="29" fill="#ef4444"/>
      <text x="85" y="526" fill="#fff" font-size="24" font-family="Inter, Arial" font-weight="900">SEND SOS</text>
